name: Docker Image CI

on:
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        python-version: '3.10'

    - name: Install requirements
      run: pip install -r requirements.txt


    - name: test
      run: pytest

   

